[versions]
agp = "8.10.1"
firebaseBom = "34.3.0"
koinAndroid = "4.1.0"
koinAndroidxCompose = "4.1.0"
kotlin = "2.2.20"
coreKtx = "1.17.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
lifecycleRuntimeKtx = "2.9.4"
activityCompose = "1.11.0"
composeBom = "2025.09.01"
googleGmsGoogleServices = "4.4.3"
firebaseFirestore = "26.0.1"
navigationCompose = "2.9.5"
mockk = "1.13.10"
robolectric = "4.12.2"
koinTest = "4.1.0"
ktorClientCore = "3.2.3"
ktorClientCio = "3.2.3"
ktorSerializationKotlinxJson = "3.2.3"
ktorClientContentNegotiation = "3.2.3"
ktorClientLogging = "3.2.3"
